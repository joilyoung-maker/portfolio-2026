<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weight Training Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-slate-50 font-outfit text-slate-700 flex justify-center min-h-screen; -webkit-tap-highlight-color: transparent; }
        }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-[480px] bg-white min-h-screen shadow-2xl shadow-slate-200 flex flex-col relative overflow-hidden">
        <!-- Header -->
        <header class="flex justify-between items-center p-6 border-b border-slate-100 sticky top-0 bg-white/80 backdrop-blur-md z-10">
            <button id="prev-date-btn" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors" aria-label="이전 날짜">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="text-center">
                <h1 id="current-date-text" class="text-lg font-bold text-slate-800">오늘</h1>
                <span id="current-date-sub" class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">2026. 04. 26</span>
            </div>
            <div class="flex gap-1">
                <button id="next-date-btn" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors" aria-label="다음 날짜">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <button id="open-history-btn" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors" aria-label="전체 기록 보기">
                    <i class="fas fa-list"></i>
                </button>
                <button id="open-calendar-btn" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors" aria-label="달력 보기">
                    <i class="fas fa-calendar-alt"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 p-5 overflow-y-auto">
            <section class="bg-white border border-slate-100 rounded-3xl p-5 mb-6 shadow-sm">
                <div id="favorites-list" class="mb-4"></div>
                <form id="workout-form" class="flex flex-col gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label for="exercise-name" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">운동 종목</label>
                        <input type="text" id="exercise-name" placeholder="예: 벤치 프레스" required autocomplete="off"
                            class="w-full p-3.5 bg-slate-50 border-none rounded-2xl text-sm font-medium focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all placeholder:text-slate-300">
                    </div>
                    <div class="flex gap-3">
                        <div class="flex flex-col gap-1.5 flex-1">
                            <label for="exercise-weight" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">무게 (kg)</label>
                            <input type="number" id="exercise-weight" placeholder="0" min="0" step="0.5"
                                class="w-full p-3.5 bg-slate-50 border-none rounded-2xl text-sm font-medium focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all placeholder:text-slate-300">
                        </div>
                        <div class="flex flex-col gap-1.5 flex-1">
                            <label for="exercise-sets" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">세트</label>
                            <input type="number" id="exercise-sets" placeholder="0" min="1" required
                                class="w-full p-3.5 bg-slate-50 border-none rounded-2xl text-sm font-medium focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all placeholder:text-slate-300">
                        </div>
                        <div class="flex flex-col gap-1.5 flex-1">
                            <label for="exercise-reps" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">횟수</label>
                            <input type="number" id="exercise-reps" placeholder="0" min="1" required
                                class="w-full p-3.5 bg-slate-50 border-none rounded-2xl text-sm font-medium focus:ring-2 focus:ring-indigo-500/20 outline-none transition-all placeholder:text-slate-300">
                        </div>
                    </div>
                    <button type="submit" id="submit-btn" 
                        class="mt-2 bg-indigo-600 text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-indigo-700 active:scale-95 transition-all shadow-lg shadow-indigo-100">
                        <i class="fas fa-plus"></i> <span>기록 추가</span>
                    </button>
                </form>
            </section>

            <section>
                <div class="flex justify-between items-end px-1 mb-4">
                    <h2 class="text-sm font-bold text-slate-800 uppercase tracking-widest">오늘의 기록</h2>
                    <span id="total-volume" class="text-[10px] font-bold text-indigo-500 uppercase">총 볼륨: 0 kg</span>
                </div>
                <ul id="workout-list" class="flex flex-col gap-2"></ul>
                <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-slate-300 gap-4">
                    <i class="fas fa-dumbbell text-4xl opacity-20"></i>
                    <p class="text-xs font-medium">아직 기록된 운동이 없습니다.</p>
                </div>
            </section>
        </main>

        <!-- Modals -->
        <div id="calendar-view" class="absolute inset-0 bg-white z-50 flex flex-col p-6 hidden transition-all">
            <div class="flex justify-between items-center mb-8 mt-2">
                <div class="flex items-center gap-4">
                    <button id="cal-prev-btn" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors"><i class="fas fa-chevron-left"></i></button>
                    <h2 id="calendar-title" class="text-xl font-bold text-slate-800">2026년 4월</h2>
                    <button id="cal-next-btn" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors"><i class="fas fa-chevron-right"></i></button>
                </div>
                <button id="close-calendar-btn" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex-1">
                <div class="grid grid-cols-7 mb-4 text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">이번 달 총 볼륨</p>
                <p class="text-3xl font-black text-indigo-600"><span id="monthly-volume-text">0 kg</span></p>
            </div>
        </div>

        <div id="history-view" class="absolute inset-0 bg-white z-50 flex flex-col p-6 hidden transition-all">
            <div class="flex justify-between items-center mb-6 mt-2">
                <h2 class="text-xl font-bold text-slate-800">전체 기록</h2>
                <button id="close-history-btn" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors"><i class="fas fa-times"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto -mx-6 px-6">
                <table class="w-full text-left">
                    <thead class="sticky top-0 bg-white z-10 border-b border-slate-100">
                        <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                            <th class="py-4 text-center">날짜</th>
                            <th class="py-4">종목</th>
                            <th class="py-4 text-center">무게</th>
                            <th class="py-4 text-center">세트</th>
                            <th class="py-4 text-center">횟수</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </div>
    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
