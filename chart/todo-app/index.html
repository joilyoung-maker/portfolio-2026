<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 할 일 목록</title>
    <meta name="description" content="A beautiful and dynamic to-do list application.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <div class="container glass-panel">
        <header class="app-header">
            <div class="header-title-area">
                <h1>나의 할 일</h1>
                <p id="date-display">오늘</p>
            </div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="active">진행 중</button>
                <button class="filter-btn" data-filter="completed">완료됨</button>
            </div>
        </header>

        <form id="todo-form">
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="어떤 일을 해야 하나요?" autocomplete="off" required>
                <button type="submit" id="add-btn"><i class="fas fa-plus"></i></button>
            </div>
        </form>



        <ul id="todo-list">
            <!-- Todo items will be injected here -->
        </ul>

        <div class="todo-footer">
            <div class="footer-left">
                <span id="items-left">0개 남음</span>
                <a href="https://calendar.google.com" target="_blank" class="footer-gcal-btn" title="구글 캘린더 바로가기">
                    <i class="far fa-calendar-alt"></i>
                </a>
            </div>
            <button id="clear-completed">완료된 항목 삭제</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
